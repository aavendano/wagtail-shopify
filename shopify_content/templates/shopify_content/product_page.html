{% load wagtailcore_tags semantic_links %}
<!DOCTYPE html>
<html>
<head>
<title>{{ page.title }}</title>
{% include "shopify_content/includes/hreflang_tags.html" %}
</head>
<body>
<h1>{{ page.title }}</h1>
{% if page.shopify_images.all %}
<div class="product-images">
    {% for img in page.shopify_images.all %}
    <img src="{{ img.url }}" alt="{{ img.alt_text }}" loading="lazy">
    {% endfor %}
</div>
{% endif %}
{% render_internal_links page %}
</body>
</html>
