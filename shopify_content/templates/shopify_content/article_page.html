{% load wagtailcore_tags wagtailimages_tags %}
<!DOCTYPE html>
<html>
<head>
<title>{{ page.title }}</title>
{% include "shopify_content/includes/hreflang_tags.html" %}
</head>
<body>
<h1>{{ page.title }}</h1>
{% if page.featured_image_url %}
<img src="{{ page.featured_image_url }}" alt="{{ page.featured_image_alt }}" loading="lazy">
{% elif page.featured_image %}
{% image page.featured_image original as featured %}
<img src="{{ featured.url }}" alt="{{ page.featured_image_alt|default:page.title }}" loading="lazy">
{% endif %}
</body>
</html>
