{% if groups %}
  {% for group in groups %}
    <section class="internal-links internal-links--{{ group.type }}">
      <h2>{{ group.heading }}</h2>
      <ul>
        {% for link in group.links %}
          <li><a href="{{ link.url }}">{{ link.label }}</a></li>
        {% endfor %}
      </ul>
    </section>
  {% endfor %}
{% elif links %}
  <section class="internal-links">
    <ul>
      {% for link in links %}
        <li><a href="{{ link.url }}">{{ link.label }}</a></li>
      {% endfor %}
    </ul>
  </section>
{% endif %}
