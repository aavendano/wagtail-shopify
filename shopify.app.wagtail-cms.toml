
client_id = "5045aa8f0d16fbd8e6ee66207cb39a8e"
name = "Wagtail-CMS"
application_url = "https://wagtail-dev.aadigitalbusiness.com/shopify-admin"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-07"

[access_scopes]
scopes = "read_content,read_online_store_pages,write_content,write_online_store_pages,read_products,write_products"

[auth]
redirect_urls = [ "https://wagtail-dev.aadigitalbusiness.com/auth/callback" ]

# ---------------------------------------------------------------------------
# App-owned metaobject definitions
# Shopify type prefix: $app:<handle>
# deploy with: shopify app deploy
# ---------------------------------------------------------------------------

[[extensions]]
type = "metaobject_definition"
handle = "location-page"
name = "Location Page"
display_name_field = "titulo"

  [extensions.access]
  storefront = "public_read"

  [extensions.capabilities.onlineStore]

  [extensions.capabilities.renderable]

  [[extensions.field_definitions]]
  key = "titulo"
  name = "Título"
  type = "single_line_text_field"
  required = true

  [[extensions.field_definitions]]
  key = "subtitulo"
  name = "Subtítulo"
  type = "single_line_text_field"

  [[extensions.field_definitions]]
  key = "intro"
