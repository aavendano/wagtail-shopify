
client_id = "5045aa8f0d16fbd8e6ee66207cb39a8e"
name = "Wagtail-CMS"
application_url = "https://wagtail-dev.aadigitalbusiness.com/shopify-admin"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-07"

[access_scopes]
scopes = "read_content,read_online_store_pages,write_content,write_online_store_pages,read_products,write_products,read_metaobjects,write_metaobjects,read_metaobject_definitions,write_metaobject_definitions"

[auth]
redirect_urls = [ "https://wagtail-dev.aadigitalbusiness.com/auth/callback" ]

# ---------------------------------------------------------------------------
# App-owned metaobject definitions (TOML declarative format)
# Shopify type: $app:location-page
# deploy with: shopify app deploy --config wagtail-cms
# ---------------------------------------------------------------------------

[metaobjects.app.location-page]
name = "Location Page"
display_name_field = "titulo"
access.storefront = "public_read"
capabilities.renderable = true

[metaobjects.app.location-page.fields.titulo]
name = "Título"
type = "single_line_text_field"
required = true

[metaobjects.app.location-page.fields.subtitulo]
name = "Subtítulo"
type = "single_line_text_field"

[metaobjects.app.location-page.fields.intro]
name = "Intro"
type = "multi_line_text_field"

[metaobjects.app.location-page.fields.country]
name = "Country"
type = "single_line_text_field"

[metaobjects.app.location-page.fields.state]
name = "State / Province"
type = "single_line_text_field"

[metaobjects.app.location-page.fields.city]
name = "City"
type = "single_line_text_field"

[metaobjects.app.location-page.fields.titulo_2]
name = "Título 2"
type = "single_line_text_field"

[metaobjects.app.location-page.fields.subtitulo_h2]
name = "Subtítulo H2"
type = "single_line_text_field"

[metaobjects.app.location-page.fields.content_2]
name = "Content 2"
type = "multi_line_text_field"

[metaobjects.app.location-page.fields.titulo_3]
name = "Título 3"
type = "single_line_text_field"

[metaobjects.app.location-page.fields.subtitulo_3]
name = "Subtítulo 3"
type = "single_line_text_field"

[metaobjects.app.location-page.fields.content_3]
name = "Content 3"
type = "multi_line_text_field"

[metaobjects.app.location-page.fields.brand_section_title]
name = "Brand Section Title"
type = "single_line_text_field"

[metaobjects.app.location-page.fields.brand_section_subtitle]
name = "Brand Section Subtitle"
type = "single_line_text_field"

[metaobjects.app.location-page.fields.brand_section_content]
name = "Brand Section Content"
type = "multi_line_text_field"

[metaobjects.app.location-page.fields.map_title]
name = "Map Title"
type = "single_line_text_field"

[metaobjects.app.location-page.fields.map_content]
name = "Map Content"
